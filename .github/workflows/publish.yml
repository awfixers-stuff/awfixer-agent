name: Publish

# Publishes @awfixerai/* packages on pushes to master. The workflow must be
# present so npm trusted publishers (OIDC) can reference it via
# `bun scripts/setup-npm-trust.ts`.
on:
   push:
      branches:
         - master

concurrency:
   group: publish-${{ github.sha }}
   cancel-in-progress: false

env:
   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
   GLIBC_FLOOR: "2.17"

permissions:
   contents: read

jobs:
   native_source_hash:
      name: Compute native source hash
      runs-on: ubuntu-22.04
      outputs:
         source-hash: ${{ steps.compute.outputs.source-hash }}
      steps:
         - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
         - name: Compute native source hash
           id: compute
           shell: bash
           run: |
              source_hash=$(find crates Cargo.toml Cargo.lock rust-toolchain.toml \
                      packages/natives/scripts packages/natives/package.json \
                      scripts/ci-build-native.ts scripts/host-detect.ts \
                      -type f -print0 \
                    | sort -z \
                    | xargs -0 sha256sum \
                    | sha256sum \
                    | cut -c1-16)
              echo "source-hash=$source_hash" >> "$GITHUB_OUTPUT"
              echo "Native source hash: $source_hash"

   build_native_linux_x64:
      name: "Native: Linux x64 (${{ matrix.variant }})"
      needs: native_source_hash
      runs-on: ubuntu-22.04
      strategy:
         fail-fast: false
         matrix:
            include:
               - { variant: baseline }
               - { variant: modern }
      steps:
         - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
         - uses: ./.github/actions/build-native
           with:
              hash: ${{ needs.native_source_hash.outputs.source-hash }}
              platform: linux
              arch: x64
              variant: ${{ matrix.variant }}
              glibc: ${{ env.GLIBC_FLOOR }}

   build_native_cross_platform:
      name: "Native: ${{ matrix.platform }} ${{ matrix.arch }}"
      needs: native_source_hash
      strategy:
         fail-fast: false
         matrix:
            include:
               - { os: ubuntu-24.04-arm, platform: linux, arch: arm64, target: aarch64-unknown-linux-gnu }
               - { os: macos-15-intel, platform: darwin, arch: x64, variant: baseline }
               - { os: macos-14, platform: darwin, arch: arm64 }
      runs-on: ${{ matrix.os }}
      steps:
         - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
         - uses: ./.github/actions/build-native
           with:
              hash: ${{ needs.native_source_hash.outputs.source-hash }}
              platform: ${{ matrix.platform }}
              arch: ${{ matrix.arch }}
              variant: ${{ matrix.variant }}
              target: ${{ matrix.target }}
              glibc: ${{ matrix.platform == 'linux' && env.GLIBC_FLOOR || '' }}

   publish_npm:
      name: Publish @awfixerai/* packages to npm
      needs: [native_source_hash, build_native_linux_x64]
      runs-on: ubuntu-22.04
      # `id-token: write` lets npm mint the GitHub OIDC token it exchanges for a
      # short-lived publish token (trusted publishing + provenance). When a
      # package has no matching trusted publisher configured, npm silently falls
      # back to NODE_AUTH_TOKEN below — which also covers first-ever publishes.
      permissions:
         id-token: write
         contents: read
      steps:
         - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
         - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
           with:
              bun-version: "1.3"
         - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
           with:
              node-version: "24"
              registry-url: "https://registry.npmjs.org"
         - name: Ensure npm supports trusted publishing
           run: npm install -g npm@latest
         - name: Cache bun dependencies
           uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
           with:
              path: ~/.bun/install/cache
              key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
         - run: bun install --frozen-lockfile
         # The coding-agent prepack executes workspace code that loads the
         # natives addon, so this job needs linux x64 native artifacts.
         - name: Download native addons
           uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
           with:
              pattern: agent-natives-linux-x64-*-h${{ needs.native_source_hash.outputs.source-hash }}
              path: packages/natives/native
              merge-multiple: true
         - name: Publish to npm
           env:
              NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
           run: bun run ci:release:publish

   publish_native_leaf:
      name: "Publish native leaf: ${{ matrix.target_id }}"
      needs: [native_source_hash, build_native_cross_platform, build_native_linux_x64]
      strategy:
         fail-fast: false
         matrix:
            include:
               - { os: ubuntu-22.04, platform: linux, arch: x64, target_id: linux-x64 }
               - { os: ubuntu-24.04-arm, platform: linux, arch: arm64, target_id: linux-arm64 }
               - { os: macos-15-intel, platform: darwin, arch: x64, target_id: darwin-x64 }
               - { os: macos-14, platform: darwin, arch: arm64, target_id: darwin-arm64 }
      runs-on: ${{ matrix.os }}
      permissions:
         id-token: write
         contents: read
      steps:
         - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
         - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
           with:
              bun-version: "1.3"
         - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
           with:
              node-version: "24"
              registry-url: "https://registry.npmjs.org"
         - name: Ensure npm supports trusted publishing
           run: npm install -g npm@latest
         - name: Cache bun dependencies
           uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
           with:
              path: ~/.bun/install/cache
              key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
         - run: bun install --frozen-lockfile
         - name: Download native addon(s)
           uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
           with:
              pattern: agent-natives-${{ matrix.platform }}-${{ matrix.arch }}*-h${{ needs.native_source_hash.outputs.source-hash }}
              path: packages/natives/native
              merge-multiple: true
         - name: Publish native addon package
           env:
              NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
           run: bun run ci:release:publish-native-leaf ${{ matrix.target_id }}