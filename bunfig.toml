telemetry = false

[install]
minimumReleaseAge = 259200 # 3 days in seconds
minimumReleaseAgeExcludes = ["@types/bun", "bun-types"]
linker = "hoisted"
exact = true
saveTextLockfile = true

[loader]
".md" = "text"
".py" = "text"
".lark" = "text"

[test]
pathIgnorePatterns = [
  "**/node_modules/**",
  "**/.git/**",
  "**/target/**",
  "**/dist/**",
  "python/**",
  "docs/**",
  "runs/**",
  "python/autoawfixer/data/**",
  ".wt/**",
  ".worktrees/**",
]

[run]
bun = true
