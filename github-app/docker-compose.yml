services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prwatch
      POSTGRES_PASSWORD: prwatch
      POSTGRES_DB: prwatch
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prwatch"]
      interval: 2s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: ..
      dockerfile: github-app/Dockerfile.gateway
    ports:
      - "8090:8080"
    environment:
      DATABASE_URL: postgresql://prwatch:prwatch@postgres:5432/prwatch
      GITHUB_WEBHOOK_SECRET: dev-secret
      PRWATCH_MIGRATE_ON_START: "true"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: github-app/Dockerfile.worker
      args:
        AGENT_BASE: awfixer-agent/agent:dev
    environment:
      DATABASE_URL: postgresql://prwatch:prwatch@postgres:5432/prwatch
      PRWATCH_WORKER_ID: worker-local
      PRWATCH_STUB_PIPELINE: "true"
      E2B_API_KEY: ""
    volumes:
      - prwatch-data:/data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  prwatch-data: