openapi: 3.0.3
info:
  title: prwatch API
  version: 1.0.0
  description: REST API for the prwatch GitHub App Android client.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      summary: API health check
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Healthz"
  /me:
    get:
      summary: Token identity
      responses:
        "200":
          description: Current token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /installations:
    get:
      summary: List installations visible to the token
      responses:
        "200":
          description: Installations
          content:
            application/json:
              schema:
                type: object
                properties:
                  installations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Installation"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /repos:
    get:
      summary: List tracked repos for an installation
      parameters:
        - in: query
          name: installation
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Repos
          content:
            application/json:
              schema:
                type: object
                properties:
                  repos:
                    type: array
                    items:
                      $ref: "#/components/schemas/Repo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /repos/{owner}/{repo}/prs:
    get:
      summary: List open pull requests
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
      responses:
        "200":
          description: Pull requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  pull_requests:
                    type: array
                    items:
                      $ref: "#/components/schemas/PullRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /repos/{owner}/{repo}/prs/{number}:
    get:
      summary: Pull request detail with review history
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
        - $ref: "#/components/parameters/number"
      responses:
        "200":
          description: Pull request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullRequestDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /repos/{owner}/{repo}/prs/{number}/reviews/{review_id}:
    get:
      summary: Review findings
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
        - $ref: "#/components/parameters/number"
        - in: path
          name: review_id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Findings
          content:
            application/json:
              schema:
                type: object
                properties:
                  findings:
                    type: array
                    items:
                      $ref: "#/components/schemas/Finding"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /repos/{owner}/{repo}/prs/{number}/re-review:
    post:
      summary: Enqueue manual re-review
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
        - $ref: "#/components/parameters/number"
      responses:
        "202":
          description: Job enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: integer
                    format: int64
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /jobs/{id}:
    get:
      summary: Review job status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    owner:
      in: path
      name: owner
      required: true
      schema:
        type: string
    repo:
      in: path
      name: repo
      required: true
      schema:
        type: string
    number:
      in: path
      name: number
      required: true
      schema:
        type: integer
  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Healthz:
      type: object
      properties:
        ok:
          type: boolean
    Error:
      type: object
      properties:
        error:
          type: string
    Me:
      type: object
      properties:
        id:
          type: integer
          format: int64
        label:
          type: string
        installation_id:
          type: integer
          format: int64
          nullable: true
    Installation:
      type: object
      properties:
        id:
          type: integer
          format: int64
        installation_id:
          type: integer
          format: int64
        account_login:
          type: string
        account_type:
          type: string
    Repo:
      type: object
      properties:
        id:
          type: integer
          format: int64
        full_name:
          type: string
        default_branch:
          type: string
        tracked:
          type: boolean
        installation_id:
          type: integer
          format: int64
    PullRequest:
      type: object
      properties:
        id:
          type: integer
          format: int64
        number:
          type: integer
        head_sha:
          type: string
        state:
          type: string
        title:
          type: string
        author:
          type: string
        updated_at:
          type: string
          format: date-time
        latest_job_id:
          type: integer
          format: int64
          nullable: true
        latest_job_state:
          type: string
          nullable: true
        latest_conclusion:
          type: string
          nullable: true
    PullRequestDetail:
      type: object
      properties:
        pull_request:
          $ref: "#/components/schemas/PullRequest"
        reviews:
          type: array
          items:
            $ref: "#/components/schemas/Review"
    Review:
      type: object
      properties:
        id:
          type: integer
          format: int64
        review_job_id:
          type: integer
          format: int64
        summary:
          type: string
        conclusion:
          type: string
          nullable: true
        enqueued_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
          nullable: true
    Finding:
      type: object
      properties:
        id:
          type: integer
          format: int64
        path:
          type: string
        line:
          type: integer
        side:
          type: string
        severity:
          type: string
        category:
          type: string
        message:
          type: string
        rule_id:
          type: string
          nullable: true
        confidence:
          type: number
          format: float
          nullable: true
    Job:
      type: object
      properties:
        id:
          type: integer
          format: int64
        pr_id:
          type: integer
          format: int64
        head_sha:
          type: string
        trigger_event:
          type: string
        state:
          type: string
        attempts:
          type: integer
        max_attempts:
          type: integer
        enqueued_at:
          type: string
          format: date-time
        claimed_at:
          type: string
          format: date-time
          nullable: true
        finished_at:
          type: string
          format: date-time
          nullable: true
        last_error:
          type: string
          nullable: true