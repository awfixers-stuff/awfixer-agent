services:
  # ───────────────────────────────────────────────────────────────────────────
  # autoawfixer orchestrator
  #
  # NOTE: `env_file:` is INTENTIONALLY ABSENT. We never want the gh-proxy's
  # PAT (`GITHUB_TOKEN` in .env) to leak into this container's environment.
  # Every variable below is an explicit allowlist; compose still reads `.env`
  # for `${VAR}` interpolation, but only the keys listed here flow into the
  # container. Adding a new secret means an explicit compose-level decision
  # about which container is allowed to see it.
  # ───────────────────────────────────────────────────────────────────────────
  autoawfixer:
    build:
      # pi root: gives the web-builder stage access to the workspace
      # bun.lock + catalog (web/package.json refs `catalog:` versions).
      # python/autoawfixer/data and pi-root excludes are filtered via
      # Dockerfile.autoawfixer.dockerignore at the context root.
      context: ../..
      dockerfile: Dockerfile.autoawfixer
      args:
        # Tag of the pre-built pi-base image produced by `bun run agent:image`
        # (sources: pi root /Dockerfile). Override per-environment as needed.
        PI_BASE: awfixer-agent/agent:dev
    image: autoawfixer:dev
    container_name: autoawfixer
    # Phase B (graceful shutdown): gives the orchestrator at least
    # AUTOAWFIXER_SHUTDOWN_DRAIN_TIMEOUT_SECONDS + AUTOAWFIXER_SHUTDOWN_KILL_TIMEOUT_SECONDS
    # before SIGKILL. Defaults: 25 + 5 = 30s.
    stop_grace_period: 30s
    restart: unless-stopped
    environment:
      # --- gh-proxy channel ---
      # The orchestrator NEVER holds GITHUB_TOKEN; it talks to the sibling
      # gh-proxy container over the internal-only network.
      AUTOAWFIXER_GH_PROXY_URL: http://gh-proxy:8081
      AUTOAWFIXER_GH_PROXY_HMAC_KEY: ${AUTOAWFIXER_GH_PROXY_HMAC_KEY:?AUTOAWFIXER_GH_PROXY_HMAC_KEY must be set in .env}

      # --- webhook + identity ---
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:?GITHUB_WEBHOOK_SECRET must be set in .env}
      AUTOAWFIXER_BOT_LOGIN: ${AUTOAWFIXER_BOT_LOGIN:?AUTOAWFIXER_BOT_LOGIN must be set in .env}
      AUTOAWFIXER_GIT_AUTHOR_NAME: ${AUTOAWFIXER_GIT_AUTHOR_NAME:-}
      AUTOAWFIXER_GIT_AUTHOR_EMAIL: ${AUTOAWFIXER_GIT_AUTHOR_EMAIL:?AUTOAWFIXER_GIT_AUTHOR_EMAIL must be set in .env}
      AUTOAWFIXER_REPO_ALLOWLIST: ${AUTOAWFIXER_REPO_ALLOWLIST:?AUTOAWFIXER_REPO_ALLOWLIST must be set in .env}
      AUTOAWFIXER_MAINTAINER_LOGINS: ${AUTOAWFIXER_MAINTAINER_LOGINS:-}
      AUTOAWFIXER_REVIEWER_BOTS: ${AUTOAWFIXER_REVIEWER_BOTS:-}

      # --- PR review / vouch gate ---
      # When PRs are gated by the vouch GitHub Action, set the trigger to
      # `vouched_label` so autoawfixer reviews ONLY PRs that survive the gate
      # (the workflow labels survivors `AUTOAWFIXER_VOUCH_REVIEW_LABEL`), instead
      # of racing the gate on PR open. `vouched_label` keeps review ENABLED.
      AUTOAWFIXER_PR_REVIEW_ENABLED: ${AUTOAWFIXER_PR_REVIEW_ENABLED:-true}
      AUTOAWFIXER_PR_REVIEW_TRIGGER: ${AUTOAWFIXER_PR_REVIEW_TRIGGER:-open}
      AUTOAWFIXER_VOUCH_REVIEW_LABEL: ${AUTOAWFIXER_VOUCH_REVIEW_LABEL:-vouched}
      AUTOAWFIXER_VOUCH_REVIEW_LABELER: ${AUTOAWFIXER_VOUCH_REVIEW_LABELER:-github-actions[bot]}

      # --- model selection ---
      AUTOAWFIXER_MODEL: ${AUTOAWFIXER_MODEL:-anthropic/claude-sonnet-4-6}
      AUTOAWFIXER_PROVIDER: ${AUTOAWFIXER_PROVIDER:-}
      AUTOAWFIXER_THINKING: ${AUTOAWFIXER_THINKING:-high}

      # --- runtime tuning ---
      AUTOAWFIXER_MAX_CONCURRENCY: ${AUTOAWFIXER_MAX_CONCURRENCY:-8}
      AUTOAWFIXER_TASK_TIMEOUT_SECONDS: ${AUTOAWFIXER_TASK_TIMEOUT_SECONDS:-2400}
      AUTOAWFIXER_TASK_TIMEOUT_HARD_GRACE_SECONDS: ${AUTOAWFIXER_TASK_TIMEOUT_HARD_GRACE_SECONDS:-60}
      AUTOAWFIXER_REQUEST_TIMEOUT_SECONDS: ${AUTOAWFIXER_REQUEST_TIMEOUT_SECONDS:-120}
      AUTOAWFIXER_SHUTDOWN_DRAIN_TIMEOUT_SECONDS: ${AUTOAWFIXER_SHUTDOWN_DRAIN_TIMEOUT_SECONDS:-25}
      AUTOAWFIXER_SHUTDOWN_KILL_TIMEOUT_SECONDS: ${AUTOAWFIXER_SHUTDOWN_KILL_TIMEOUT_SECONDS:-5}
      AUTOAWFIXER_EVENT_MAX_RETRIES: ${AUTOAWFIXER_EVENT_MAX_RETRIES:-3}
      AUTOAWFIXER_EVENT_RETRY_DELAYS_SECONDS: ${AUTOAWFIXER_EVENT_RETRY_DELAYS_SECONDS:-30,120,600}
      AUTOAWFIXER_TASK_COMPLETION_MAX_REMINDERS: ${AUTOAWFIXER_TASK_COMPLETION_MAX_REMINDERS:-2}
      AUTOAWFIXER_RATE_LIMIT_WINDOW_SECONDS: ${AUTOAWFIXER_RATE_LIMIT_WINDOW_SECONDS:-3600}
      AUTOAWFIXER_RATE_LIMIT_DEFAULT: ${AUTOAWFIXER_RATE_LIMIT_DEFAULT:-3}
      AUTOAWFIXER_RATE_LIMIT_CONTRIBUTOR: ${AUTOAWFIXER_RATE_LIMIT_CONTRIBUTOR:-10}
      AUTOAWFIXER_RATE_LIMIT_UNLIMITED: ${AUTOAWFIXER_RATE_LIMIT_UNLIMITED:-}
      AUTOAWFIXER_QUESTION_AUTOCLOSE_ENABLED: ${AUTOAWFIXER_QUESTION_AUTOCLOSE_ENABLED:-true}
      AUTOAWFIXER_QUESTION_AUTOCLOSE_HOURS: ${AUTOAWFIXER_QUESTION_AUTOCLOSE_HOURS:-4}
      AUTOAWFIXER_QUESTION_AUTOCLOSE_SCAN_SECONDS: ${AUTOAWFIXER_QUESTION_AUTOCLOSE_SCAN_SECONDS:-60}
      AUTOAWFIXER_REPLAY_TOKEN: ${AUTOAWFIXER_REPLAY_TOKEN:-}

      # --- container-fixed paths ---
      AUTOAWFIXER_OMP_COMMAND: omp
      AUTOAWFIXER_WORKSPACE_ROOT: /data/workspaces
      AUTOAWFIXER_SQLITE_PATH: /data/autoawfixer.sqlite
      AUTOAWFIXER_LOG_DIR: /data/logs
      AUTOAWFIXER_NATIVES_CACHE_ENABLED: ${AUTOAWFIXER_NATIVES_CACHE_ENABLED:-true}
      AUTOAWFIXER_NATIVES_CACHE_ROOT: ${AUTOAWFIXER_NATIVES_CACHE_ROOT:-/data/cache/pi-natives}
      AUTOAWFIXER_NATIVES_CACHE_MAX_ENTRIES_PER_REPO: ${AUTOAWFIXER_NATIVES_CACHE_MAX_ENTRIES_PER_REPO:-8}
      AUTOAWFIXER_NATIVES_CACHE_MAX_BYTES: ${AUTOAWFIXER_NATIVES_CACHE_MAX_BYTES:-4294967296}
      AUTOAWFIXER_NATIVES_CACHE_GC_INTERVAL_SECONDS: ${AUTOAWFIXER_NATIVES_CACHE_GC_INTERVAL_SECONDS:-3600}
      AUTOAWFIXER_BIND_HOST: ${AUTOAWFIXER_BIND_HOST:-0.0.0.0}
      AUTOAWFIXER_BIND_PORT: ${AUTOAWFIXER_BIND_PORT:-8080}
      AGENT_ROOT: /work/pi
    depends_on:
      gh-proxy:
        condition: service_started
    # Resolve `llm-gateway.internal` (used in /srv/agent-home/.omp/agent/models.yml) to the
    # Docker host. The actual gateway listens on 127.0.0.1:4000 on the host;
    # `host-gateway` is Docker's alias for the host bridge IP.
    extra_hosts:
      - "llm-gateway.internal:host-gateway"
    networks:
      - default
      - autoawfixer_internal
    volumes:
      - ${AGENT_ROOT:-../..}:/work/pi:ro
      - autoawfixer_data:/data
      # Host agent config is mounted read-only under /srv/agent-home-stage
      # with host-controlled permissions. The entrypoint copies it into
      # root-owned, world-readable files under /srv/agent-home; the agent
      # subprocess runs with HOME=/srv/agent-home, so ~/.omp and ~/.agent
      # resolve there without exposing mutable host mounts.
      - ${HOME}/.omp/agent/models.container.yml:/srv/agent-home-stage/.omp/agent/models.yml:ro
      - ${HOME}/.agent/AGENT.md:/srv/agent-home-stage/.agent/AGENTS.md:ro
      - ${HOME}/.agent/rules:/srv/agent-home-stage/.agent/rules:ro
    ports:
      - "0.0.0.0:6543:8080"

  # ───────────────────────────────────────────────────────────────────────────
  # gh-proxy
  #
  # The only container that ever holds GITHUB_TOKEN. Reachable only from the
  # orchestrator on the internal-only network — no host port mapping. Every
  # request must carry a valid HMAC signature (AUTOAWFIXER_GH_PROXY_HMAC_KEY).
  # `env_file:` is INTENTIONALLY ABSENT for the same reason: the explicit
  # allowlist below is the only place where any var lands in this container.
  # ───────────────────────────────────────────────────────────────────────────
  gh-proxy:
    image: autoawfixer:dev
    container_name: gh-proxy
    restart: unless-stopped
    command: ["uv", "run", "--package", "autoawfixer", "python", "-m", "autoawfixer.proxy", "serve"]
    environment:
      # PAT: lives ONLY here. The orchestrator's compose block refuses to
      # let this var into its container.
      GITHUB_TOKEN: ${GITHUB_TOKEN:?GITHUB_TOKEN must be set in .env}
      # Shared with the orchestrator: HMAC verification key.
      AUTOAWFIXER_GH_PROXY_HMAC_KEY: ${AUTOAWFIXER_GH_PROXY_HMAC_KEY:?AUTOAWFIXER_GH_PROXY_HMAC_KEY must be set in .env}
      # The proxy reuses the SandboxManager pool layout under /data/workspaces.
      AUTOAWFIXER_WORKSPACE_ROOT: /data/workspaces
      AUTOAWFIXER_SQLITE_PATH: /data/autoawfixer.sqlite
      AUTOAWFIXER_LOG_DIR: /data/logs
      # Bind on the internal network only.
      AUTOAWFIXER_GH_PROXY_BIND_HOST: 0.0.0.0
      AUTOAWFIXER_GH_PROXY_BIND_PORT: 8081
      # Settings still requires these on construction; the proxy never uses
      # them but the validator runs the same code path as the orchestrator.
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:?GITHUB_WEBHOOK_SECRET must be set in .env}
      AUTOAWFIXER_BOT_LOGIN: ${AUTOAWFIXER_BOT_LOGIN:?AUTOAWFIXER_BOT_LOGIN must be set in .env}
      AUTOAWFIXER_GIT_AUTHOR_EMAIL: ${AUTOAWFIXER_GIT_AUTHOR_EMAIL:?AUTOAWFIXER_GIT_AUTHOR_EMAIL must be set in .env}
      AUTOAWFIXER_REPO_ALLOWLIST: ${AUTOAWFIXER_REPO_ALLOWLIST:?AUTOAWFIXER_REPO_ALLOWLIST must be set in .env}
    networks:
      # `default` gives gh-proxy outbound NAT to api.github.com; `autoawfixer_internal`
      # is how the orchestrator reaches it. No `ports:` mapping → still
      # unreachable from the host or any sibling project.
      - default
      - autoawfixer_internal
    volumes:
      # Shared workspace pool/worktrees so the proxy can drive git operations
      # against the same per-issue worktrees the orchestrator builds.
      - autoawfixer_data:/data

networks:
  # External-facing bridge: webhook ingress (8080) and the orchestrator's
  # outbound path to the host LLM gateway via extra_hosts.
  default: {}
  # Orchestrator <-> gh-proxy only. internal: true means no egress and no
  # ingress from outside the compose project.
  autoawfixer_internal:
    internal: true

volumes:
  # Docker-managed Linux volume so UID/GID permissions on /data are enforced.
  autoawfixer_data: {}
